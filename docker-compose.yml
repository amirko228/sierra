# PostgreSQL для локальной разработки (Docker Desktop).
# На хосте порт 5433 → в контейнере 5432 (чтобы не конфликтовать с локальным PostgreSQL на 5432).

services:
  postgres:
    image: postgres:16-alpine
    container_name: sierra-karakol-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sierra
      POSTGRES_PASSWORD: sierra_secret
      POSTGRES_DB: sierra_karakol
    ports:
      - '5433:5432'
    volumes:
      - sierra_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sierra -d sierra_karakol']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  sierra_pgdata:
